services:
  - type: web
    name: smart-privilege-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn run:app --bind 0.0.0.0:$PORT

    envVars:
      - key: DATABASE_URL
        value: YOUR_NEON_DATABASE_URL

      - key: SECRET_KEY
        generateValue: true

      - key: JWT_SECRET_KEY
        generateValue: true

      - key: CORS_ORIGINS
        value: "https://smart-privilege.vercel.app"
